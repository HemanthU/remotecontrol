<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Remote</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins;
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
    text-align:center;
}

h1 { margin:20px; }

#status {
    margin-bottom:10px;
}

/* Cards */
.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    margin:10px;
    border-radius:18px;
    width:300px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 20px #22c55e;
}

/* Buttons */
button {
    margin:6px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    width:120px;
}

button:hover { background:#16a34a; }

/* Output */
pre {
    background:black;
    color:#00ff00;
    margin:20px;
    padding:10px;
    border-radius:10px;
    height:200px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ MAX Remote Control</h1>
<h3 id="status">🟢 Ready</h3>

<div class="container">

<div class="card">
<h3>Apps</h3>
<button onclick="send('calc')">Calc</button>
<button onclick="send('notepad')">Notes</button>
<button onclick="send('taskmgr')">Tasks</button>
</div>

<div class="card">
<h3>Web</h3>
<button onclick="send('web https://google.com')">Google</button>
<button onclick="send('web https://youtube.com')">YouTube</button>
</div>

<div class="card">
<h3>System</h3>
<button onclick="send('shutdown')">Shutdown</button>
<button onclick="send('restart')">Restart</button>
<button onclick="send('lock')">Lock</button>
</div>

<div class="card">
<h3>Files</h3>
<button onclick="send('explorer')">Explorer</button>
<button onclick="send('files')">Files</button>
</div>

<div class="card">
<h3>Info</h3>
<button onclick="send('ipconfig')">IP</button>
<button onclick="send('systeminfo')">System</button>
</div>

<div class="card">
<h3>Advanced</h3>
<button onclick="send('screenshot')">Shot</button>
<button onclick="send('tasklist')">Processes</button>
<button onclick="send('beep')">Beep</button>
</div>

<div class="card">
<h3>Command</h3>
<input id="cmd" placeholder="Enter command">
<br><br>
<button onclick="custom()">Run</button>
</div>

<div class="card">
<h3>Automation</h3>
<button onclick="send('demo')">Demo</button>
</div>

</div>

<pre id="out">> Ready...</pre>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

function send(command){
    document.getElementById("status").innerText = "🟡 Sending...";
    document.getElementById("out").innerText = "> Executing " + command;

    fetch(SERVER+"/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({command})
    })
    .then(()=>{
        document.getElementById("status").innerText = "🟠 Executing...";
    })
    .catch(()=>{
        document.getElementById("status").innerText = "🔴 Server Error";
    });
}

function custom(){
    let cmd = document.getElementById("cmd").value;
    send(cmd);
}

async function getOutput(){
    try{
        let res = await fetch(SERVER+"/output");
        let data = await res.json();

        if(data.output){
            document.getElementById("out").innerText = "> " + data.output;
            document.getElementById("status").innerText = "🟢 Completed";
        }
    } catch {
        document.getElementById("status").innerText = "🔴 Offline";
    }
}

setInterval(getOutput,2000);
</script>

</body>
</html>
