<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Remote</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

h1 { margin:20px; }

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:#1e293b;
    padding:15px;
    margin:10px;
    border-radius:15px;
    width:300px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(34,197,94,0.5);
}

button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#16a34a;
}

#touchpad {
    width:90%;
    height:300px;
    background:#000;
    margin:20px auto;
    border-radius:20px;
}
</style>
</head>

<body>

<h1>⚡ MAX Remote</h1>

<div class="container">

<div class="card">
<h3>Apps</h3>
<button onclick="send('calc')">Calculator</button>
<button onclick="send('notepad')">Notepad</button>
</div>

<div class="card">
<h3>Advanced</h3>
<button onclick="send('screenshot')">Screenshot</button>
<button onclick="send('getfiles')">Files</button>
</div>

</div>

<h2>🖱️ Touchpad</h2>
<div id="touchpad"></div>

<pre id="out"></pre>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

function send(command){
    fetch(SERVER+"/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({command})
    });
}

// TOUCHPAD LOGIC
let lastX = 0;
let lastY = 0;

const pad = document.getElementById("touchpad");

pad.addEventListener("touchstart", e => {
    let t = e.touches[0];
    lastX = t.clientX;
    lastY = t.clientY;

    send("mousedown");
});

pad.addEventListener("touchmove", e => {
    let t = e.touches[0];

    let dx = t.clientX - lastX;
    let dy = t.clientY - lastY;

    lastX = t.clientX;
    lastY = t.clientY;

    fetch(SERVER + "/send", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            command: "move " + dx + " " + dy
        })
    });
});

pad.addEventListener("touchend", () => {
    send("mouseup");
});

pad.addEventListener("click", () => {
    send("click");
});

// output
async function getOutput(){
    let res = await fetch(SERVER + "/output");
    let data = await res.json();
    document.getElementById("out").innerText = data.output;
}

setInterval(getOutput,2000);
</script>

</body>
</html>
