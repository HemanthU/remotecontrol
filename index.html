<!DOCTYPE html>
<html>
<head>
<title>MAX Remote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}
button {
    margin:10px;
    padding:15px;
    width:85%;
    font-size:16px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:10px;
}
button:hover {
    background:#16a34a;
}
input {
    padding:12px;
    width:85%;
    border-radius:8px;
    border:none;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>⚡ MAX Remote</h1>

<h3>Apps</h3>
<button onclick="send('calc')">Calculator</button>
<button onclick="send('notepad')">Notepad</button>
<button onclick="send('taskmgr')">Task Manager</button>

<h3>System</h3>
<button onclick="send('shutdown /s /t 0')">Shutdown</button>
<button onclick="send('shutdown /r /t 0')">Restart</button>

<h3>Advanced</h3>
<button onclick="send('screenshot')">📸 Screenshot</button>
<button onclick="send('getfiles')">📂 Get Files</button>

<h3>Custom Command</h3>
<input id="cmd" placeholder="Enter command">
<button onclick="custom()">Send Command</button>

<button onclick="test()">🔍 Test Connection</button>

<pre id="out"></pre>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

// 🚀 send command
function send(command){
    fetch(SERVER + "/send", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({command})
    })
    .then(res => res.json())
    .then(data => console.log(data))
    .catch(err => alert("Error: " + err));
}

// custom command
function custom(){
    let cmd = document.getElementById("cmd").value;
    send(cmd);
}

// 🔍 test server
function test(){
    fetch(SERVER + "/get")
    .then(res => res.json())
    .then(data => alert("Server OK: " + JSON.stringify(data)))
    .catch(err => alert("FAILED: " + err));
}

// 📤 output display
async function getOutput(){
    let res = await fetch(SERVER + "/output");
    let data = await res.json();
    document.getElementById("out").innerText = data.output;
}

setInterval(getOutput, 2000);
</script>

</body>
</html>
