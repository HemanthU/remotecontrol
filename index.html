<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Remote</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins;
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
    text-align:center;
}

h1 { margin:20px; }

#status {
    margin-bottom:10px;
}

/* Layout */
.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    margin:10px;
    border-radius:18px;
    width:300px;
}

/* Buttons */
button {
    margin:6px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    width:120px;
    cursor:pointer;
}

input, textarea {
    padding:10px;
    width:90%;
    border-radius:8px;
    border:none;
}

/* Output (bigger, same style) */
pre {
    margin:20px auto;
    background:black;
    color:#00ff00;
    padding:12px;
    border-radius:12px;

    width:95%;
    max-width:1000px;
    height:380px;

    overflow:auto;
    text-align:left;
}
</style>
</head>

<body>

<h1>⚡ MAX Remote Control</h1>
<h3 id="status">🟢 Ready</h3>

<div class="container">

<!-- Apps -->
<div class="card">
<h3>Apps</h3>
<button onclick="send('calc')">Calc</button>
<button onclick="send('notepad')">Notepad</button>
<button onclick="send('mspaint')">Paint</button>
<button onclick="send('taskmgr')">TaskMgr</button>
<button onclick="send('cmd')">CMD</button>
<button onclick="send('powershell')">PowerShell</button>
</div>

<!-- Web -->
<div class="card">
<h3>Web</h3>
<button onclick="send('web google.com')">Google</button>
<button onclick="send('web youtube.com')">YouTube</button>
<button onclick="send('web github.com')">GitHub</button>
<button onclick="send('web chat.openai.com')">ChatGPT</button>
</div>

<!-- System -->
<div class="card">
<h3>System</h3>
<button onclick="send('shutdown')">Shutdown</button>
<button onclick="send('restart')">Restart</button>
<button onclick="send('lock')">Lock</button>
</div>

<!-- Files -->
<div class="card">
<h3>Files</h3>
<button onclick="send('files')">List</button>
<button onclick="send('open_c')">C Drive</button>
<button onclick="send('open_d')">D Drive</button>
</div>

<!-- Info -->
<div class="card">
<h3>Info</h3>
<button onclick="send('ipconfig')">IP</button>
<button onclick="send('systeminfo')">System</button>
<button onclick="send('whoami')">User</button>
<button onclick="send('hostname')">PC Name</button>
</div>

<!-- Advanced -->
<div class="card">
<h3>Advanced</h3>
<button onclick="send('screenshot')">Shot</button>
<button onclick="send('tasklist')">Processes</button>
<button onclick="send('beep')">Beep</button>
</div>

<!-- Command -->
<div class="card">
<h3>Command</h3>
<input id="cmd" placeholder="Enter command">
<br><br>
<button onclick="custom()">Run</button>
</div>

<!-- Automation -->
<div class="card">
<h3>Automation</h3>

<button onclick="send('demo')">Demo</button>
<button onclick="send('study_mode')">Study</button>
<button onclick="send('fun_mode')">Fun</button>

<br><br>

<textarea id="auto" placeholder="Enter commands line by line"></textarea>

<br><br>

<button onclick="runAuto()">Run Automation</button>

</div>

</div>

<pre id="out">> Ready...</pre>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

function send(command){
    document.getElementById("status").innerText = "🟡 Sending...";
    document.getElementById("out").innerText = "> Executing " + command;

    fetch(SERVER+"/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({command})
    })
    .then(()=>{
        document.getElementById("status").innerText = "🟠 Executing...";
    })
    .catch(()=>{
        document.getElementById("status").innerText = "🔴 Server Error";
    });
}

function custom(){
    let cmd = document.getElementById("cmd").value;
    send(cmd);
}

function runAuto(){
    let commands = document.getElementById("auto").value.split("\n");
    let i = 0;

    function runNext(){
        if(i >= commands.length) return;

        let cmd = commands[i].trim();
        if(cmd){
            send(cmd);
        }

        i++;
        setTimeout(runNext, 1500);
    }

    runNext();
}

async function getOutput(){
    try{
        let res = await fetch(SERVER+"/output");
        let data = await res.json();

        let out = data.output;

        if(out && out.startsWith("IMG:")){
            let imgData = out.replace("IMG:","");
            document.getElementById("out").innerHTML =
                `<img src="data:image/png;base64,${imgData}" width="100%">`;
        } else if(out){
            document.getElementById("out").innerText = "> " + out;
        }

        document.getElementById("status").innerText = "🟢 Completed";

        document.getElementById("out").scrollTop =
        document.getElementById("out").scrollHeight;

    } catch {
        document.getElementById("status").innerText = "🔴 Offline";
    }
}

setInterval(getOutput,2000);
</script>

</body>
</html>
