<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Remote</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

h1 {
    margin:20px;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:#1e293b;
    padding:15px;
    margin:10px;
    border-radius:15px;
    width:300px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(34,197,94,0.5);
}

button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#16a34a;
    transform:scale(1.05);
}

input {
    padding:10px;
    width:90%;
    border-radius:8px;
    border:none;
}

pre {
    margin:20px;
    background:#000;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>⚡ MAX Remote Control</h1>

<div class="container">

<!-- Apps -->
<div class="card">
<h3>Apps</h3>
<button onclick="send('calc')">Calculator</button>
<button onclick="send('notepad')">Notepad</button>
<button onclick="send('taskmgr')">Task Manager</button>
</div>

<!-- System -->
<div class="card">
<h3>System</h3>
<button onclick="send('shutdown /r /t 5')">Restart</button>
<button onclick="send('rundll32.exe user32.dll,LockWorkStation')">Lock</button>
</div>

<!-- Mouse -->
<div class="card">
<h3>Mouse</h3>
<button onclick="send('left')">⬅️</button>
<button onclick="send('right')">➡️</button>
<button onclick="send('up')">⬆️</button>
<button onclick="send('down')">⬇️</button>
<br>
<button onclick="send('click')">Click</button>
</div>

<!-- Drag -->
<div class="card">
<h3>Drag</h3>
<button onclick="send('drag_left')">⬅️ Drag</button>
<button onclick="send('drag_right')">➡️ Drag</button>
<button onclick="send('drag_up')">⬆️ Drag</button>
<button onclick="send('drag_down')">⬇️ Drag</button>
</div>

<!-- Advanced -->
<div class="card">
<h3>Advanced</h3>
<button onclick="send('screenshot')">📸 Screenshot</button>
<button onclick="send('getfiles')">📂 Files</button>
</div>

<!-- Custom -->
<div class="card">
<h3>Custom Command</h3>
<input id="cmd" placeholder="Enter command">
<button onclick="custom()">Run</button>
</div>

</div>

<pre id="out"></pre>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

function send(command){
    fetch(SERVER+"/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({command})
    });
}

function custom(){
    let cmd=document.getElementById("cmd").value;
    send(cmd);
}

async function getOutput(){
    let res=await fetch(SERVER+"/output");
    let data=await res.json();
    document.getElementById("out").innerText=data.output;
}

setInterval(getOutput,2000);
</script>

</body>
</html>
