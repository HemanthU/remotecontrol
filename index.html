<!DOCTYPE html>
<html>
<head>
<title>MAX Remote</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
button { margin:6px; padding:10px; border:none; background:#22c55e; color:white; border-radius:6px; }
input { padding:10px; margin:5px; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>🔐 MAX Login</h1>

<div id="login">
    <input id="keyInput" placeholder="Enter any key">
    <button onclick="login()">Login</button>
</div>

<div id="panel" class="hidden">

<h2>⚡ MAX Control Panel</h2>

<button onclick="send('calc')">Calculator</button>
<button onclick="send('notepad')">Notepad</button>
<button onclick="send('taskmgr')">Task Manager</button>

<br><br>

<button onclick="send('shutdown /s /t 0')">Shutdown</button>

<br><br>

<button onclick="send('screenshot')">📸 Screenshot</button>
<button onclick="send('getfiles')">📂 Get Files</button>

<br><br>

<input id="cmd" placeholder="Custom command">
<button onclick="custom()">Send</button>

<br><br>
<button onclick="logout()">Logout</button>

<pre id="out"></pre>

</div>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

function login(){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").classList.remove("hidden");
}

function logout(){
    document.getElementById("panel").classList.add("hidden");
    document.getElementById("login").style.display="block";
}

function send(command){
    fetch(SERVER+"/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({command})
    });
}

function custom(){
    let cmd=document.getElementById("cmd").value;
    send(cmd);
}

async function getOutput(){
    let res=await fetch(SERVER+"/output");
    let data=await res.json();
    document.getElementById("out").innerText=data.output;
}

setInterval(getOutput,2000);
</script>

</body>
</html>
