<!DOCTYPE html>
<html>
<head>
<title>MAX Remote</title>
<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}
button {
    margin:6px;
    padding:10px 15px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
input {
    padding:10px;
    width:220px;
    margin:5px;
}
.section {
    margin:20px;
}
.hidden {
    display:none;
}
</style>
</head>

<body>

<h1>🔐 MAX Secure Login</h1>

<!-- LOGIN -->
<div id="login">
    <input id="keyInput" placeholder="Enter Access Key">
    <br>
    <button onclick="login()">Login</button>
</div>

<!-- CONTROL PANEL -->
<div id="panel" class="hidden">

<h2>⚡ MAX Control Panel</h2>

<div class="section">
<h3>Apps</h3>
<button onclick="send('calc')">Calculator</button>
<button onclick="send('notepad')">Notepad</button>
<button onclick="send('taskmgr')">Task Manager</button>
</div>

<div class="section">
<h3>System</h3>
<button onclick="send('shutdown /s /t 0')">Shutdown</button>
<button onclick="send('shutdown /r /t 0')">Restart</button>
<button onclick="send('rundll32.exe user32.dll,LockWorkStation')">Lock</button>
</div>

<div class="section">
<h3>Advanced</h3>
<button onclick="send('screenshot')">📸 Screenshot</button>
<button onclick="send('getfiles')">📂 Get Files</button>
</div>

<div class="section">
<h3>Custom Command</h3>
<input id="cmd" placeholder="Enter command">
<button onclick="custom()">Send</button>
</div>

<button onclick="logout()">Logout</button>

<pre id="out"></pre>

</div>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";
let USER_KEY = "";

// 🔐 login
function login(){
    USER_KEY = document.getElementById("keyInput").value;

    if(USER_KEY){
        document.getElementById("login").style.display = "none";
        document.getElementById("panel").classList.remove("hidden");
    }
}

// 🚪 logout
function logout(){
    USER_KEY = "";
    document.getElementById("panel").classList.add("hidden");
    document.getElementById("login").style.display = "block";
}

// 🚀 send command
function send(command){
    fetch(SERVER+"/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            command:command,
            key: USER_KEY
        })
    });
}

// custom command
function custom(){
    let cmd=document.getElementById("cmd").value;
    send(cmd);
}

// output
async function getOutput(){
    let res=await fetch(SERVER+"/output");
    let data=await res.json();
    document.getElementById("out").innerText=data.output;
}

setInterval(getOutput,2000);
</script>

</body>
</html>
