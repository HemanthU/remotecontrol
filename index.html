<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Remote</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Poppins;
    background: linear-gradient(135deg,#020617,#0f172a);
    color:white;
    text-align:center;
}

h1 { margin:20px; }
#status { margin-bottom:10px; }

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    margin:10px;
    border-radius:18px;
    width:300px;
}

button {
    margin:6px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    width:120px;
}

pre {
    margin:20px auto;
    background:black;
    color:#00ff00;
    padding:12px;
    border-radius:12px;
    width:95%;
    max-width:1100px;
    height:420px;
    overflow:auto;
    text-align:left;
}
</style>
</head>

<body>

<h1>⚡ MAX Remote Control</h1>
<h3 id="status">🟢 Ready</h3>

<div class="container">

<div class="card">
<h3>Volume</h3>
<button onclick="send('volume_up')">Vol +</button>
<button onclick="send('volume_down')">Vol -</button>
<button onclick="send('mute')">Mute</button>
</div>

<div class="card">
<h3>Brightness</h3>
<button onclick="send('brightness_up')">Bright +</button>
<button onclick="send('brightness_down')">Bright -</button>
</div>

<div class="card">
<h3>Apps</h3>
<button onclick="send('calc')">Calc</button>
<button onclick="send('notepad')">Notepad</button>
<button onclick="send('cmd')">CMD</button>
<button onclick="send('powershell')">PowerShell</button>
</div>

<div class="card">
<h3>Taskbar</h3>
<button onclick="send('task1')">1</button>
<button onclick="send('task2')">2</button>
<button onclick="send('task3')">3</button>
<button onclick="send('task4')">4</button>
<button onclick="send('task5')">5</button>
<button onclick="send('task6')">6</button>
<button onclick="send('task7')">7</button>
<button onclick="send('task8')">8</button>
<button onclick="send('task9')">9</button>
<button onclick="send('task10')">10</button>
</div>

<div class="card">
<h3>Web</h3>
<button onclick="send('web google.com')">Google</button>
<button onclick="send('web youtube.com')">YouTube</button>
<button onclick="send('web github.com')">GitHub</button>
</div>

<div class="card">
<h3>Screen</h3>
<button onclick="send('screenshot')">Shot</button>
<button onclick="send('webcam')">Cam</button>
</div>

<div class="card">
<h3>Command</h3>
<input id="cmd" placeholder="Enter command" style="width:90%">
<br><br>
<button onclick="custom()">Run</button>
</div>

<div class="card">
<h3>Automation</h3>
<textarea id="auto" placeholder="Enter commands line by line" style="width:90%;height:100px"></textarea>
<br><br>
<button onclick="runAuto()">Run</button>
</div>

</div>

<pre id="out">> Ready...</pre>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

function send(command){
    document.getElementById("status").innerText = "🟡 Sending...";
    document.getElementById("out").innerText = "> " + command;

    fetch(SERVER+"/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({command})
    });
}

function custom(){
    let cmd = document.getElementById("cmd").value;
    send(cmd);
}

async function runAuto(){
    let commands = document.getElementById("auto").value.split("\n");

    for(let i = 0; i < commands.length; i++){
        let cmd = commands[i].trim();

        if(cmd){
            send(cmd);
            await new Promise(r => setTimeout(r, 3000));
        }
    }
}
</script>

</body>
</html>
