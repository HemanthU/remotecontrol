<!DOCTYPE html>
<html>
<head>
    <title>MAX Remote</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        button {
            margin: 8px;
            padding: 10px 20px;
            border: none;
            background: #00adb5;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        input {
            padding: 10px;
            width: 200px;
        }
    </style>
</head>
<body>

<h2>⚡ MAX Remote Control</h2>

<!-- SYSTEM -->
<h3>System</h3>
<button onclick="send('shutdown /s /t 0')">Shutdown</button>
<button onclick="send('shutdown /r /t 0')">Restart</button>
<button onclick="send('rundll32.exe user32.dll,LockWorkStation')">Lock</button>

<!-- APPS -->
<h3>Apps</h3>
<button onclick="send('notepad')">Notepad</button>
<button onclick="send('calc')">Calculator</button>
<button onclick="send('start chrome')">Chrome</button>
<button onclick="send('code')">VS Code</button>

<!-- SYSTEM TOOLS -->
<h3>Tools</h3>
<button onclick="send('taskmgr')">Task Manager</button>
<button onclick="send('control')">Control Panel</button>
<button onclick="send('explorer')">File Explorer</button>

<!-- NETWORK -->
<h3>Network</h3>
<button onclick="send('ipconfig')">IP Address</button>

<!-- CUSTOM -->
<h3>Custom Command</h3>
<input id="cmd" placeholder="Enter command">
<button onclick="custom()">Send</button>

<pre id="out"></pre>

<script>
const SERVER = "https://remotecontrol-24kg.onrender.com";

function send(command) {
    fetch(SERVER + "/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({command: command})
    });
}

function custom() {
    let cmd = document.getElementById("cmd").value;
    send(cmd);
}

async function getOutput() {
    let res = await fetch(SERVER + "/output");
    let data = await res.json();
    document.getElementById("out").innerText = data.output;
}

setInterval(getOutput, 2000);
</script>

</body>
</html>
